# Two-stage sweep for layer-wise upper clipping.
# Sweeps lr plus independent thresholds for fc1 and fc2.
# fc1 (inputâ†’hidden) typically receives smaller gradients; fc2 (hiddenâ†’output)
# can have larger gradients in magnitude â€” the sweep finds the optimal ratio.
base_config: experiments/clipping_modes_heavy_tail/configs/layerwise_upper.yaml
parallel_jobs: 4
primary_metric: best_val_loss
lower_is_better: true

stage1:
  search: grid
  axes:
    - field: inner_optimizer.lr
      values: [0.001, 0.01, 0.05, 0.1]
      log_scale: true
    - field: inner_optimizer.clipping.layer_overrides.fc1.upper
      values: [0.1, 0.5, 1.0, 5.0]
    - field: inner_optimizer.clipping.layer_overrides.fc2.upper
      values: [0.5, 1.0, 5.0, 10.0]

stage2:
  search: grid
  n_values: 4
  zoom_factor: 0.4
  axes:
    - field: inner_optimizer.lr
      log_scale: true
    - field: inner_optimizer.clipping.layer_overrides.fc1.upper
    - field: inner_optimizer.clipping.layer_overrides.fc2.upper
