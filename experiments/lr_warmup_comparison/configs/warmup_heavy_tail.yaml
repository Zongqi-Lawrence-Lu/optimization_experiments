# Linear LR warmup — heavy-tail (Student-t df=2) noise.
# LR ramps from 0 to lr over warmup_steps, then stays constant at lr.
# warmup_max_lr is left null so it defaults to lr (peak = constant LR).
# The sweep independently finds the best lr, clipping.upper, and warmup_steps.
run_name: warmup_heavy_tail
seed: 42
total_outer_steps: 500
eval_every: 25
log_gradients_every: 25
checkpoint_every: 250
checkpoint_interval_minutes: 10.0
resume: false
output_dir: outputs/lr_warmup_comparison
results_dir: results/lr_warmup_comparison
plots_dir: plots/lr_warmup_comparison
deterministic: false
device: cpu

distributed:
  mode: centralized
  num_nodes: 1
  local_steps: 1
  data_distribution: iid
  participation_rate: 1.0
  partition_file: null

data:
  task: regression
  num_samples: 2000
  num_features: 20
  noise_distribution: student_t
  noise_scale: 1.0
  noise_df: 2.0
  feature_distribution: gaussian
  common_feature_fraction: 0.5
  common_prob: 0.9
  rare_prob: 0.1
  random_seed: 42
  batch_size: 32
  dirichlet_alpha: 0.5

model:
  kind: two_layer_mlp
  in_features: 20
  hidden_size: 32
  pretrained_name: ''
  arch_name: ''
  pretrained: false
  num_classes: 1
  custom_factory: null

inner_optimizer:
  name: sgd
  lr: 0.05
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0.0
  custom_factory: null
  warmup_steps: 100     # swept; LR ramps 0→lr over this many steps
  warmup_max_lr: null   # defaults to lr (warmup peak = constant post-warmup LR)
  warmup_schedule: linear
  clipping:
    clip_type: upper
    clip_scope: global
    upper: 1.0
    lower: 0.0
    layer_overrides: {}
    dynamic: false
    dynamic_percentile: 0.9
    dynamic_ema_decay: 0.99

outer_optimizer:
  name: average
  lr: 1.0
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0.0
  custom_factory: null
  clipping:
    clip_type: none
    clip_scope: global
    upper: 1.0
    lower: 0.0
    layer_overrides: {}
    dynamic: false
    dynamic_percentile: 0.9
    dynamic_ema_decay: 0.99

metrics:
  - loss
