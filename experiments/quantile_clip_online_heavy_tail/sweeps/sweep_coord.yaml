# Two-stage sweep for online quantile clipping — coordinate scope.
# Axes: lr x quantile_level x quantile_lr (3-D grid).
base_config: experiments/quantile_clip_online_heavy_tail/configs/coord_quantile.yaml
parallel_jobs: 4
primary_metric: best_val_loss
lower_is_better: true

stage1:
  search: grid
  axes:
    - field: inner_optimizer.lr
      values: [0.001, 0.005, 0.01, 0.05, 0.1]
      log_scale: true
    - field: inner_optimizer.clipping.quantile_level
      values: [0.7, 0.8, 0.9, 0.95, 0.99]
    - field: inner_optimizer.clipping.quantile_lr
      values: [0.001, 0.01, 0.1]
      log_scale: true

stage2:
  search: grid
  n_values: 3
  zoom_factor: 0.4
  axes:
    - field: inner_optimizer.lr
      log_scale: true
    - field: inner_optimizer.clipping.quantile_level
    - field: inner_optimizer.clipping.quantile_lr
      log_scale: true
