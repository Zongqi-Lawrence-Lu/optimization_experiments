# Mode (d): Generative â€” T5-small fine-tuning on OPUS-100 Enâ†’De, distributed.
# Switch tgt_lang to "fr" for Englishâ†’French.
# Switch dataset_name to "wmt14"/"wmt16" for larger WMT corpora.

run_name: t5_opus100_en_de_distributed
seed: 42
total_outer_steps: 2000
eval_every: 100
log_gradients_every: 100
checkpoint_every: 400
checkpoint_interval_minutes: 10.0
resume: false
output_dir: outputs
results_dir: results
plots_dir: plots
deterministic: false
device: cuda    # requires A40 or similar

distributed:
  mode: distributed
  num_nodes: 5
  local_steps: 5
  data_distribution: iid
  participation_rate: 1.0
  partition_file: null

data:
  dataset_name: opus100
  src_lang: en
  tgt_lang: de
  task_type: seq2seq
  tokenizer_name: t5-small
  max_seq_len: 128
  batch_size: 8           # smaller per-node batch; T5 is memory-heavy
  num_workers: 2
  split_train: train
  split_val: validation
  split_test: test

model:
  kind: hf_seq2seq
  pretrained_name: t5-small
  num_classes: 1          # unused for seq2seq
  in_features: 0
  arch_name: ''
  pretrained: true
  custom_factory: null

inner_optimizer:
  name: adamw
  lr: 1.0e-04             # lower LR per node; outer optimizer aggregates updates
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0.01
  custom_factory: null
  warmup_steps: 100
  warmup_max_lr: 1.0e-04
  warmup_schedule: linear
  clipping:
    clip_type: upper
    clip_scope: global
    upper: 1.0
    lower: 0.0
    layer_overrides: {}
    dynamic: false
    dynamic_percentile: 0.9
    dynamic_ema_decay: 0.99

outer_optimizer:
  name: adam
  lr: 0.01
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-03
  weight_decay: 0.0
  custom_factory: null
  warmup_steps: 0
  warmup_max_lr: null
  warmup_schedule: linear
  clipping:
    clip_type: upper
    clip_scope: global
    upper: 10.0
    lower: 0.0
    layer_overrides: {}
    dynamic: false
    dynamic_percentile: 0.9
    dynamic_ema_decay: 0.99

metrics:
  - loss
  - bleu
