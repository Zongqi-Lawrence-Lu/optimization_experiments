# Mode (a): Convex linear regression — heavy-tailed noise (Student-t), centralized.
# Gaussian features, Student-t(df=2) noise for heavy-tail regime.

run_name: linreg_heavy_tail_centralized
seed: 42
total_outer_steps: 500
eval_every: 50
log_gradients_every: 50
checkpoint_every: 100
checkpoint_interval_minutes: 10.0
resume: false
output_dir: outputs
results_dir: results
plots_dir: plots
deterministic: false
device: cpu

distributed:
  mode: centralized
  num_nodes: 1
  local_steps: 1
  data_distribution: iid
  participation_rate: 1.0
  partition_file: null

data:
  task: regression
  num_samples: 2000
  num_features: 20
  noise_distribution: student_t    # heavy-tailed
  noise_scale: 1.0
  noise_df: 2.0                    # df=2 → very heavy tail
  feature_distribution: gaussian
  common_feature_fraction: 0.5
  common_prob: 0.9
  rare_prob: 0.1
  random_seed: 42
  batch_size: 32
  dirichlet_alpha: 0.5

model:
  kind: linear
  in_features: 20
  pretrained_name: ''
  arch_name: ''
  pretrained: false
  num_classes: 1
  custom_factory: null

inner_optimizer:
  name: sgd
  lr: 0.01
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0.0
  custom_factory: null
  warmup_steps: 0
  warmup_max_lr: null
  warmup_schedule: linear
  clipping:
    clip_type: upper       # global L2 clipping — effective against heavy-tail noise spikes
    clip_scope: global
    upper: 1.0
    lower: 0.0
    layer_overrides: {}
    dynamic: false
    dynamic_percentile: 0.9
    dynamic_ema_decay: 0.99

outer_optimizer:
  name: average
  lr: 1.0
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0.0
  custom_factory: null
  clipping:
    clip_type: none
    clip_scope: global
    upper: 1.0
    lower: 0.0
    layer_overrides: {}
    dynamic: false
    dynamic_percentile: 0.9
    dynamic_ema_decay: 0.99

metrics:
  - loss
  - param_distance
