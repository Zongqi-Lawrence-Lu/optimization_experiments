# Two-stage hyperparameter sweep — Mode (d): T5 WMT translation (centralized).
# Fine-tune T5-small on OPUS-100 En→De.
#
# Usage:
#   python -m framework.sweep.two_stage \
#       configs/sweep_t5_wmt.yaml \
#       outputs/sweeps/t5_wmt_sweep

base_config: configs/t5_wmt.yaml
parallel_jobs: 2
primary_metric: best_val_loss
lower_is_better: true

stage1:
  search: grid
  axes:
    - field: inner_optimizer.lr
      values: [1.0e-04, 5.0e-04, 1.0e-03]
      log_scale: true
    - field: inner_optimizer.clipping.upper
      values: [0.5, 1.0, 5.0]
    - field: inner_optimizer.eps
      values: [1.0e-08, 1.0e-06]
    - field: inner_optimizer.weight_decay
      values: [0.0, 0.01]

stage2:
  search: grid
  n_values: 3
  zoom_factor: 0.5
  axes:
    - field: inner_optimizer.lr
      log_scale: true
    - field: inner_optimizer.clipping.upper
    - field: inner_optimizer.weight_decay
