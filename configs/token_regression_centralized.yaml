# Mode (b): Convex linear regression — token frequency features, centralized.
# Bernoulli-mixed features (small "common" group with high activation probability,
# large "rare" group with low activation probability) mimic natural-language token
# distributions.  Heavy-tailed noise (Student-t) to stress-test clipping.

run_name: token_regression_centralized
seed: 42
total_outer_steps: 500
eval_every: 50
log_gradients_every: 50
checkpoint_every: 100
checkpoint_interval_minutes: 10.0
resume: false
output_dir: outputs
results_dir: results
plots_dir: plots
deterministic: false
device: cpu

distributed:
  mode: centralized
  num_nodes: 1
  local_steps: 1
  data_distribution: iid
  participation_rate: 1.0
  partition_file: null

data:
  task: regression
  num_samples: 3000
  num_features: 100            # larger feature space so rare vs common ratio is meaningful
  noise_distribution: student_t
  noise_scale: 0.5
  noise_df: 3.0
  feature_distribution: bernoulli_mixed
  common_feature_fraction: 0.1  # 10 common features (high prob)
  common_prob: 0.9              # each common feature active 90% of time
  rare_prob: 0.01               # each rare feature active 1% of time
  random_seed: 42
  batch_size: 32
  dirichlet_alpha: 0.5

model:
  kind: linear
  in_features: 100
  pretrained_name: ''
  arch_name: ''
  pretrained: false
  num_classes: 1
  custom_factory: null

inner_optimizer:
  name: adagrad            # adaptive per-coordinate LR suits sparse/rare features
  lr: 0.1
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0.0
  custom_factory: null
  warmup_steps: 0
  warmup_max_lr: null
  warmup_schedule: linear
  clipping:
    clip_type: upper
    clip_scope: coordinate   # coordinate-wise: separate threshold per feature
    upper: 1.0
    lower: 0.0
    layer_overrides: {}
    dynamic: false
    dynamic_percentile: 0.9
    dynamic_ema_decay: 0.99

outer_optimizer:
  name: average
  lr: 1.0
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-08
  weight_decay: 0.0
  custom_factory: null
  clipping:
    clip_type: none
    clip_scope: global
    upper: 1.0
    lower: 0.0
    layer_overrides: {}
    dynamic: false
    dynamic_percentile: 0.9
    dynamic_ema_decay: 0.99

metrics:
  - loss
  - param_distance
